<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Мой первый полет — WASD управление</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script>
      // Обновленный компонент для управления WASD
      AFRAME.registerComponent('wasd-move', {
        schema: {
          speed: { type: 'number', default: 0.2 },
          minHeight: { type: 'number', default: 1.6 }
        },
        init: function () {
          this.keys = {}; // Храним состояние нажатых клавиш
          this.direction = new THREE.Vector3();
          this.sideVector = new THREE.Vector3();
          
          window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
          window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
        },
        tick: function () {
          const el = this.el;
          const pos = el.object3D.position;
          
          // Получаем направление взгляда (вперед)
          el.object3D.getWorldDirection(this.direction);
          this.direction.negate(); // Инвертируем, так как в THREE.js вперед это -Z

          // Движение вперед/назад (W/S)
          if (this.keys['KeyW']) pos.addScaledVector(this.direction, this.data.speed);
          if (this.keys['KeyS']) pos.addScaledVector(this.direction, -this.data.speed);

          // Движение влево/вправо (A/D)
          if (this.keys['KeyA'] || this.keys['KeyD']) {
            // Вычисляем вектор "в бок" через векторное произведение направления и оси UP
            this.sideVector.copy(this.direction).cross(el.object3D.up).normalize();
            if (this.keys['KeyA']) pos.addScaledVector(this.sideVector, -this.data.speed);
            if (this.keys['KeyD']) pos.addScaledVector(this.sideVector, this.data.speed);
          }

          // Ограничение высоты (не ниже поля)
          if (pos.y < this.data.minHeight) {
            pos.y = this.data.minHeight;
          }
        }
      });

      AFRAME.registerComponent('url-on-click', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            if (this.data.url) {
              window.open(this.data.url, '_blank');
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="airplane-model" src="https://cdn.aframe.io/test-models/models/glTF-2.0/virtualcity/VC.gltf"></a-asset-item>
      </a-assets>

      <a-entity camera look-controls id="plane" position="0 1.6 0" wasd-move="speed: 0.2; minHeight: 1.6">
        <a-entity cursor="fuse: false; rayOrigin: mouse;"
                  raycaster="objects: .clickable">
        </a-entity>
        
        <a-entity gltf-model="#airplane-model" 
                  position="0 -0.8 -1.5" 
                  rotation="0 180 0" 
                  scale="0.01 0.01 0.01">
        </a-entity>
      </a-entity>

      <a-sky color="#87CEEB"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="500" height="500" color="#7BC8A4"></a-plane>

      <a-box class="clickable" 
             position="0 1 -10" 
             color="orange" 
             url-on-click="url: https://google.com">
      </a-box>
      
    </a-scene>
  </body>
</html>
