version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: my-play-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: air_gallery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d air_gallery']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
